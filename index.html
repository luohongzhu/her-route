<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AfterHours - McMaster Safety Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        #map { 
            height: 100vh; 
            width: 100%; 
        }
        .info-panel {
            position: absolute;
            top: 10px;
            right: 10px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            z-index: 1000;
            max-width: 280px;
        }
        .info-panel h2 {
            margin: 0 0 5px 0;
            font-size: 20px;
            color: #1f2937;
        }
        .info-panel p {
            margin: 0 0 15px 0;
            font-size: 14px;
            color: #6b7280;
        }
        #stats {
            font-size: 13px;
            color: #4b5563;
            background: #f3f4f6;
            padding: 10px;
            border-radius: 6px;
        }
        .legend {
            position: absolute;
            bottom: 30px;
            right: 10px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            z-index: 1000;
        }
        .legend strong {
            display: block;
            margin-bottom: 10px;
            color: #1f2937;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin: 8px 0;
            font-size: 13px;
        }
        .legend-color {
            width: 40px;
            height: 4px;
            margin-right: 10px;
            border-radius: 2px;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            z-index: 2000;
            font-size: 16px;
            color: #4b5563;
        }
    </style>
</head>
<body>
    <div id="loading" class="loading">Loading map data...</div>
    <div id="map"></div>
    
    <div class="info-panel">
        <h2>AfterHours AI</h2>
        <p>McMaster Area Safety Map</p>
        <div id="stats">Loading...</div>
    </div>

    <div class="legend">
        <strong>Safety Level</strong>
        <div class="legend-item">
            <div class="legend-color" style="background: #10b981;"></div>
            <span>Safe (70-100)</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #f59e0b;"></div>
            <span>Moderate (40-69)</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #ef4444;"></div>
            <span>Unsafe (0-39)</span>
        </div>
    </div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize map centered on McMaster
        const map = L.map('map').setView([43.2609, -79.9192], 14);
        
        // Add base map layer (dark mode for night vibe)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);

        // Mark McMaster campus
        const macMarker = L.marker([43.2609, -79.9192], {
            icon: L.divIcon({
                className: 'custom-marker',
                html: '📍',
                iconSize: [30, 30]
            })
        })
        .bindPopup('<b>McMaster University</b><br>Demo starting point')
        .addTo(map);

        // Function to get safety color based on score
        function getSafetyColor(score) {
            if (score >= 70) return '#10b981'; // Green - safe
            if (score >= 40) return '#f59e0b'; // Orange - moderate
            return '#ef4444'; // Red - unsafe
        }

        // Function to draw a road segment with safety score
        function drawRoadSegment(coordinates, roadName, roadType, safetyScore) {
            const color = getSafetyColor(safetyScore);
            
            // Adjust line width based on road type
            let weight = 3;
            if (roadType === 'primary' || roadType === 'secondary') weight = 5;
            if (roadType === 'footway' || roadType === 'path') weight = 2;
            
            const polyline = L.polyline(coordinates, {
                color: color,
                weight: weight,
                opacity: 0.7,
            }).addTo(map);

            // Create popup with road info
            polyline.bindPopup(`
                <div style="font-family: system-ui;">
                    <strong style="font-size: 14px;">${roadName}</strong><br>
                    <span style="color: #6b7280; font-size: 12px;">Type: ${roadType}</span><br>
                    <div style="margin-top: 8px;">
                        <strong>Safety Score: ${safetyScore}/100</strong><br>
                        <span style="font-size: 12px; color: #6b7280;">
                            ${safetyScore >= 70 ? '✓ Generally safe' : 
                              safetyScore >= 40 ? '⚠️ Exercise caution' : 
                              '⚠️ Consider alternative route'}
                        </span>
                    </div>
                    <div style="margin-top: 10px; padding-top: 10px; border-top: 1px solid #e5e7eb;">
                        <button style="
                            background: #3b82f6;
                            color: white;
                            border: none;
                            padding: 6px 12px;
                            border-radius: 4px;
                            cursor: pointer;
                            font-size: 12px;
                        " onclick="alert('Rating feature coming soon!')">
                            Rate this segment
                        </button>
                    </div>
                </div>
            `);

            // Add hover effect
            polyline.on('mouseover', function() {
                this.setStyle({ opacity: 1, weight: weight + 2 });
            });
            polyline.on('mouseout', function() {
                this.setStyle({ opacity: 0.7, weight: weight });
            });

            return polyline;
        }

        // Load real roads from JSON
        async function loadRealRoads() {
            try {
                const response = await fetch('roads_simplified.json');
                
                if (!response.ok) {
                    throw new Error('Failed to load roads data');
                }
                
                const roads = await response.json();
                
                console.log(`Loaded ${roads.length} roads`);
                
                // Draw each road with a mock safety score
                // TODO: Replace with real safety scores from your scoring engine
                let safeRoads = 0, moderateRoads = 0, unsafeRoads = 0;
                
                roads.forEach(road => {
                    // For demo: generate mock safety score based on road type
                    // Main roads = safer (more lighting, people)
                    let baseScore;
                    if (road.type === 'primary' || road.type === 'secondary') {
                        baseScore = 60 + Math.random() * 30; // 60-90
                    } else if (road.type === 'footway' || road.type === 'path') {
                        baseScore = 30 + Math.random() * 40; // 30-70
                    } else {
                        baseScore = 40 + Math.random() * 40; // 40-80
                    }
                    
                    const safetyScore = Math.floor(baseScore);
                    
                    // Count for stats
                    if (safetyScore >= 70) safeRoads++;
                    else if (safetyScore >= 40) moderateRoads++;
                    else unsafeRoads++;
                    
                    drawRoadSegment(road.coordinates, road.name, road.type, safetyScore);
                });
                
                // Update stats panel
                document.getElementById('stats').innerHTML = `
                    <strong>${roads.length}</strong> road segments loaded<br>
                    <div style="margin-top: 8px; padding-top: 8px; border-top: 1px solid #d1d5db;">
                        <span style="color: #10b981;">●</span> ${safeRoads} safe<br>
                        <span style="color: #f59e0b;">●</span> ${moderateRoads} moderate<br>
                        <span style="color: #ef4444;">●</span> ${unsafeRoads} unsafe
                    </div>
                `;
                
                // Hide loading indicator
                document.getElementById('loading').style.display = 'none';
                
            } catch (error) {
                console.error('Error loading roads:', error);
                document.getElementById('stats').innerHTML = `
                    <span style="color: #ef4444;">❌ Error loading roads</span><br>
                    <small>Make sure roads_simplified.json exists</small>
                `;
                document.getElementById('loading').innerHTML = 'Error: Could not load map data';
            }
        }

        // Load the roads when page loads
        loadRealRoads();
    </script>
</body>
</html>
